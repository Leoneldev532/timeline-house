<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>Timeline House — Creative Studio for Film Production</title>
    <meta
      name="description"
      content="Timeline House is a creative studio focused on film production — crafting cinematic stories that wow, inspire, and move audiences worldwide."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://timeline-house.leonelyimga.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://timeline-house.leonelyimga.com" />
    <meta
      property="og:title"
      content="Timeline House — Creative Studio for Film Production"
    />
    <meta
      property="og:description"
      content="We are a creative studio focused on film production — crafting cinematic stories that wow, inspire, and move audiences worldwide."
    />
    <meta
      property="og:image"
      content="https://timeline-house.leonelyimga.com/assets/og-image.jpg"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Timeline House — Creative Studio for Film Production"
    />
    <meta
      name="twitter:description"
      content="We are a creative studio focused on film production — crafting cinematic stories that wow, inspire, and move audiences worldwide."
    />

    <!-- Preconnect (must come before font imports) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Volkhov:ital,wght@0,400;0,700;1,400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.3.25/dist/lenis.css"
    />
    <script>
      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }
      window.scrollTo(0, 0);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <main class="main h-full w-full relative overflow-hidden">
      <div
        class="hero w-full relative bg-black flex justify-center items-center overflow-hidden"
      >
        <!-- Cinematic image scroll sequence -->
        <div
          class="flex flex-col hero__sequence h-full px-4 pt-4 gap-4 bg-white w-full"
        >
          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="lg:h-[calc(100%+30vh)] h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/7f/11/50/7f1150d53ca5adde28861178d75c00b5.jpg"
              alt="Film production scene — cinematic shot by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/1200x/9e/a8/5c/9ea85c0b9646fe8cbe37033ebb743d63.jpg"
              alt="Creative film production moment by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/34/10/ec/3410ec9f161e7a551d7f6a0ee11b20e3.jpg"
              alt="Cinematic landscape captured by Timeline House studio"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/1200x/97/62/b4/9762b42f5307553f078b372efa4b59e1.jpg"
              alt="Beautiful film scenery from Timeline House production"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/27/c1/a2/27c1a2b1ae39796595b4b04a4b85acdf.jpg"
              alt="Artistic film vision from Timeline House creative studio"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/1200x/2f/c6/8b/2fc68b7c1c620269db0bc3d9a3ada2dc.jpg"
              alt="Thrilling adventure film shot by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/7f/11/50/7f1150d53ca5adde28861178d75c00b5.jpg"
              alt="Film production still by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://d3tp3928oujmo1.cloudfront.net/wow_faces_image.jpg-90.webp"
              alt="Expressive faces captured on film by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/1200x/9e/a8/5c/9ea85c0b9646fe8cbe37033ebb743d63.jpg"
              alt="Cinematic storytelling by Timeline House studio"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/34/10/ec/3410ec9f161e7a551d7f6a0ee11b20e3.jpg"
              alt="Film production landscape by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/1200x/97/62/b4/9762b42f5307553f078b372efa4b59e1.jpg"
              alt="Creative film production by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/27/c1/a2/27c1a2b1ae39796595b4b04a4b85acdf.jpg"
              alt="Artistic direction in film by Timeline House"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/1200x/2f/c6/8b/2fc68b7c1c620269db0bc3d9a3ada2dc.jpg"
              alt="Timeline House film production showcase"
            />
          </div>

          <div
            class="w-full hero-sequence__step h-[20vh] lg:h-[50vh] overflow-hidden rounded-xl"
          >
            <img
              class="h-[calc(100%+30vh)] hero__cinematic-image will-change-transform w-full object-cover"
              src="https://i.pinimg.com/736x/7f/11/50/7f1150d53ca5adde28861178d75c00b5.jpg"
              alt="Closing cinematic shot by Timeline House creative studio"
            />
          </div>

          <!-- Hero container: full-screen video section revealed on scroll -->
          <div
            id="hero-container"
            class="hero__container relative h-[94vh] lg:h-[96vh] w-full mb-6"
          >
            <!-- Site navigation -->
            <header class="w-full z-20 absolute top-0 left-0">
              <nav
                class="flex justify-between hero__header fixed top-0 is-hidden items-center w-full mt-10 md:pt-8 md:pl-14 pl-6 pr-12 md:pr-24"
                aria-label="Main navigation"
              >
                <a
                  href="/"
                  class="flex gap-2 me-font text-white"
                  aria-label="Timeline House homepage"
                >
                  <img
                    src="./assets/logo.svg"
                    class="h-4 md:h-6 object-cover"
                    alt="Timeline House logo"
                  />
                  <span
                    class="tracking-tright roboto-font md:flex hidden text-sm md:text-xl lg:text-2xl"
                    >Timeline House</span
                  >
                </a>

                <div>
                  <button
                    class="px-4 py-2 text-xl md:text-2xl tracking-tright rounded-xl bg-gray-200 roboto-font"
                    id="menu-toggle"
                    aria-label="Open main menu"
                    aria-expanded="false"
                    aria-controls="main-menu"
                  >
                    Menu
                  </button>
                </div>
              </nav>
            </header>

            <!-- Background video -->
            <div class="w-full h-full absolute rounded-xl overflow-hidden">
              <video
                class="h-full object-cover w-full"
                autoplay
                loop
                playsinline
                muted
                src="https://d3tp3928oujmo1.cloudfront.net/home_wow_faces.mp4"
                data-src-mobile="https://d3tp3928oujmo1.cloudfront.net/wow_faces_mobile.mp4"
                aria-hidden="true"
              ></video>

              <!-- Hero text overlay -->
              <div
                class="absolute px-8 md:px-12 py-8 bottom-0 flex md:flex-row flex-col-reverse md:justify-between items-start lg:items-end w-full"
              >
                <!-- Tagline -->
                <p
                  class="inline-block max-w-1/2 lg:max-w-xl text-balance w-full text-left text-lg leading-[1.2] md:text-xl roboto-font lg:text-2xl text-white"
                >
                  We are a creative studio focused on film production — crafting
                  stories that move, inspire, and endure.
                </p>

                <!-- Main headline with animated rotating word -->
                <h1
                  class="text-[14vw] md:text-[10vw] w-full uppercase h-full flex justify-center md:justify-end flex-col lg:w-auto leading-[0.9] md:leading-[0.9] text-right me-font text-orange-700 font-extrabold"
                  aria-label="We are meant to wow"
                >
                  <div class="relative hero__animated-text">we are</div>
                  <div class="relative hero__animated-text">meant to</div>

                  <!-- Animated rotating words (decorative, aria-hidden) -->
                  <div
                    class="flex relative hero__animated-text flex-col h-[12vw] md:h-[8vw] overflow-hidden"
                    aria-hidden="true"
                  >
                    <div
                      class="hero__animated-text-wrapper flex flex-col h-full w-full"
                    >
                      <span
                        class="inline-block me-font shrink-0 leading-[0.9] md:leading-[0.8] hero__animated-text-item"
                        >wow</span
                      >
                      <span
                        class="inline-block me-font shrink-0 leading-[0.9] md:leading-[0.8] hero__animated-text-item"
                        >inspire</span
                      >
                      <span
                        class="inline-block me-font shrink-0 leading-[0.9] md:leading-[0.8] hero__animated-text-item"
                        >dream</span
                      >
                      <span
                        class="inline-block me-font shrink-0 leading-[0.9] md:leading-[0.8] hero__animated-text-item"
                        >create</span
                      >
                      <span
                        class="inline-block me-font shrink-0 leading-[0.9] md:leading-[0.8] hero__animated-text-item"
                        >move</span
                      >
                      <span
                        class="inline-block me-font shrink-0 leading-[0.9] md:leading-[0.8] hero__animated-text-item"
                        >thrill</span
                      >
                    </div>
                  </div>
                </h1>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <style>
      @font-face {
        font-family: "me";
        src: url("./font/FKScreamer-Bold.woff2") format("woff2");
      }

      @font-face {
        font-family: "mo";
        src: url("./font/SourceSansPro-Regular.woff2") format("woff2");
      }

      @font-face {
        font-family: "roboto";
        src: url("./font/RobotoMono-Regular.woff2") format("woff2");
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: "me", sans-serif;
      }

      span,
      p {
        font-family: "mo", sans-serif;
      }

      h2 span {
        font-family: "me", sans-serif;
      }

      .me-font {
        font-family: "me", sans-serif;
      }

      .mo-font {
        font-family: "mo", sans-serif;
      }

      .roboto-font {
        font-family: "roboto", sans-serif;
      }

      .transparent {
        transition: all 0.3s ease-in-out;
        background: transparent;
      }

      .is-visible {
        display: block;
      }

      .is-flexible {
        display: flex;
      }

      .is-hidden {
        display: none;
      }

      .is-scrollbar-hidden {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .is-scrollbar-hidden::-webkit-scrollbar {
        display: none;
      }

      body::-webkit-scrollbar {
        width: 10px;
        display: none;
        background-color: transparent;
      }

      body::-webkit-scrollbar-track {
        width: 10px;
        background-color: orange;
      }
    </style>

    <!-- Scripts (end of body for performance) -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.25/dist/lenis.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
